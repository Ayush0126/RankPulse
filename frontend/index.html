<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankPulse Website Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ── Theme Variables ── */
        :root,[data-theme="light"]{
            --bg:       #f9fafb; --surface:   #ffffff; --surface2:  #f3f4f6;
            --text:     #1f2937; --text2:     #4b5563; --muted:     #9ca3af;
            --border:   #e5e7eb; --input-bg:  #f9fafb; --input-bd:  #d1d5db;
            --ai-bg:    #eff6ff; --ai-bd:     #bfdbfe; --ai-text:   #1e40af;
        }
        [data-theme="dark"]{
            --bg:       #0f1117; --surface:   #1a1d27; --surface2:  #22263a;
            --text:     #f1f5f9; --text2:     #94a3b8; --muted:     #64748b;
            --border:   #2d3748; --input-bg:  #22263a; --input-bd:  #374151;
            --ai-bg:    #1e1b4b; --ai-bd:     #3730a3; --ai-text:   #a5b4fc;
        }
        body { background: var(--bg); color: var(--text); }

        [data-theme="dark"] .tw-surface  { background-color: var(--surface)  !important; }
        [data-theme="dark"] .tw-surface2 { background-color: var(--surface2) !important; }
        [data-theme="dark"] .bg-white    { background-color: var(--surface)  !important; }
        [data-theme="dark"] .bg-gray-50  { background-color: var(--bg)       !important; }
        [data-theme="dark"] .bg-gray-100 { background-color: var(--surface2) !important; }
        [data-theme="dark"] .bg-blue-50  { background-color: var(--ai-bg)    !important; }
        [data-theme="dark"] .border-blue-200 { border-color: var(--ai-bd)    !important; }
        [data-theme="dark"] .text-blue-800   { color: var(--ai-text)         !important; }
        [data-theme="dark"] .text-gray-800   { color: var(--text)            !important; }
        [data-theme="dark"] .text-gray-700   { color: var(--text2)           !important; }
        [data-theme="dark"] .text-gray-600   { color: var(--text2)           !important; }
        [data-theme="dark"] .text-gray-500   { color: var(--muted)           !important; }
        [data-theme="dark"] .text-gray-400   { color: var(--muted)           !important; }
        [data-theme="dark"] .border-gray-300 { border-color: var(--border)   !important; }
        [data-theme="dark"] .border-gray-200 { border-color: var(--border)   !important; }
        [data-theme="dark"] .border-b        { border-color: var(--border)   !important; }
        [data-theme="dark"] .shadow-sm       { box-shadow: 0 1px 4px rgba(0,0,0,.5)  !important; }
        [data-theme="dark"] .shadow-md       { box-shadow: 0 4px 14px rgba(0,0,0,.5) !important; }
        [data-theme="dark"] .shadow          { box-shadow: 0 2px 8px rgba(0,0,0,.4)  !important; }
        [data-theme="dark"] input,[data-theme="dark"] select {
            background-color: var(--input-bg) !important;
            border-color:     var(--input-bd) !important;
            color:            var(--text)     !important;
        }
        [data-theme="dark"] input::placeholder { color: var(--muted) !important; }
        [data-theme="dark"] .bg-emerald-100   { background-color: #052e16 !important; }
        [data-theme="dark"] .bg-blue-950,
        [data-theme="dark"] .bg-indigo-950    { background-color: var(--ai-bg) !important; }

        .theme-btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 5px 13px; border-radius: 999px;
            border: 1.5px solid var(--border);
            background: var(--surface); color: var(--text2);
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all .2s; white-space: nowrap; line-height: 1;
        }
        .theme-btn:hover { border-color: #667eea; color: #667eea; }
        .theme-btn .track {
            width: 30px; height: 16px; border-radius: 8px;
            background: #e5e7eb; position: relative; transition: background .2s;
        }
        [data-theme="dark"] .theme-btn .track { background: #4f46e5; }
        .theme-btn .thumb {
            position: absolute; top: 2px; left: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25);
            transition: transform .2s;
        }
        [data-theme="dark"] .theme-btn .thumb { transform: translateX(14px); }

        .radar-box { position: relative; height: 340px; width: 100%; padding: 8px 4px 4px; }
        
        .rank-pos  { display:inline-flex;align-items:center;justify-content:center;
                     width:42px;height:42px;border-radius:10px;font-weight:800;font-size:15px; }
        .rank-1-3  { background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff; }
        .rank-4-10 { background:linear-gradient(135deg,#10b981,#059669);color:#fff; }
        .rank-11-30{ background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff; }
        .rank-31p  { background:rgba(100,116,139,.2);color:#64748b; }
        .rank-none { background:rgba(239,68,68,.12);color:#ef4444;font-size:11px; }

        .vis-ring {
            width:120px;height:120px;border-radius:50%;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            background:conic-gradient(#10b981 var(--pct,0%), rgba(255,255,255,.08) 0%);
            box-shadow:0 0 0 8px rgba(16,185,129,.08);
            position:relative;
        }
        .vis-ring::after {
            content:'';position:absolute;inset:10px;border-radius:50%;
            background:var(--surface,#1a1d27);
        }
        .vis-ring .vis-val  { position:relative;z-index:1;font-size:28px;font-weight:800;color:#10b981;line-height:1; }
        .vis-ring .vis-lbl  { position:relative;z-index:1;font-size:9px;color:var(--muted,#64748b);text-transform:uppercase;letter-spacing:.05em;margin-top:2px; }

        .kw-tag {
            display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;
            border-radius:999px;background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.1);font-size:12px;
            color:var(--text2,#94a3b8);
        }
        [data-theme="light"] .kw-tag { background:#f1f5f9;border-color:#e2e8f0;color:#475569; }
        .kw-tag button { background:none;border:none;cursor:pointer;color:inherit;opacity:.6;line-height:1;padding:0;font-size:14px; }
        .kw-tag button:hover { opacity:1;color:#ef4444; }

        .kw-input-wrap {
            display:flex;align-items:center;gap:8px;
            padding:8px 14px;border-radius:12px;
            border:1.5px solid var(--input-bd,rgba(255,255,255,.12));
            background:var(--input-bg,rgba(255,255,255,.06));
        }
        .kw-input-wrap input {
            flex:1;border:none;background:transparent;color:var(--text,#f1f5f9);
            font-size:13px;outline:none;min-width:120px;
        }
        .kw-input-wrap input::placeholder { color:var(--muted,#64748b); }

        .trend-up   { color:#10b981; }
        .trend-down { color:#ef4444; }
        .trend-same { color:#64748b; }

        .rank-paywall {
            position:absolute;inset:0;border-radius:20px;
            background:rgba(15,17,23,.85);backdrop-filter:blur(6px);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            z-index:10;gap:12px;
        }

        /* ── Browser Mockup Styles ── */
        .browser-mockup {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
            background: #1e2030;
            width: 100%;
            position: relative;
        }
        [data-theme="light"] .browser-mockup {
            background: #f0f0f0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.08);
        }
        .browser-titlebar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #2a2d3e;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        [data-theme="light"] .browser-titlebar {
            background: #e0e0e0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .browser-dots { display: flex; gap: 6px; }
        .browser-dot {
            width: 11px; height: 11px; border-radius: 50%;
        }
        .dot-red    { background: #ff5f57; }
        .dot-yellow { background: #febc2e; }
        .dot-green  { background: #28c840; }
        .browser-bar {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            max-width: 320px;
            margin: 0 auto;
        }
        [data-theme="light"] .browser-bar {
            background: rgba(0,0,0,0.08);
            color: rgba(0,0,0,0.5);
        }
        .browser-lock { font-size: 10px; opacity: 0.7; }
        .browser-url { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .browser-open-btn {
            font-size: 11px;
            color: #60a5fa;
            text-decoration: none;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(96,165,250,0.1);
            transition: background 0.15s;
            white-space: nowrap;
        }
        .browser-open-btn:hover { background: rgba(96,165,250,0.2); }
        .browser-screenshot-area {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #13151f;
        }
        [data-theme="light"] .browser-screenshot-area {
            background: #e8e8e8;
        }
        .browser-screenshot-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
            transition: opacity 0.3s;
        }
        .browser-screenshot-area .screenshot-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        [data-theme="light"] .browser-screenshot-area .screenshot-loading {
            color: rgba(0,0,0,0.35);
        }
        .screenshot-spinner {
            width: 28px; height: 28px;
            border: 2.5px solid rgba(16,185,129,0.2);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .browser-screenshot-area .screenshot-error {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            text-align: center;
            padding: 16px;
        }
        .screenshot-error-icon { font-size: 32px; opacity: 0.5; }
        .score-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-ring-outer {
            width: 110px; height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 0 0 6px rgba(102,126,234,0.15), 0 8px 32px rgba(102,126,234,0.35);
            position: relative;
        }
        .score-ring-inner {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--surface, #1a1d27);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        /* ── Rankings Dark Panel — JetBrains Mono font ── */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
.rk-shell {
--rk-bg:       #0a0d12;
--rk-surface:  #111520;
--rk-surface2: #171c2a;
--rk-border:   #1e2535;
--rk-border2:  #252d40;
--rk-text:     #e2e8f4;
--rk-muted:    #5a6480;
--rk-dim:      #3a4260;
--rk-green:    #00e5a0; --rk-green-dim:  #00e5a015;
--rk-yellow:   #f5c842; --rk-yellow-dim: #f5c84215;
--rk-orange:   #ff7b3a; --rk-orange-dim: #ff7b3a15;
--rk-red:      #ff4567; --rk-red-dim:    #ff456715;
--rk-blue:     #4d9fff; --rk-blue-dim:   #4d9fff15;
--rk-gold:     #ffd700; --rk-gold-dim:   #ffd70020;
--rk-purple:   #a78bfa; --rk-purple-dim: #a78bfa15;
background: var(--rk-bg);
color: var(--rk-text);
font-family: 'JetBrains Mono', monospace;
border-radius: 20px;
padding: 28px;
margin-top: 24px;
}
/* Page header */
.rk-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.rk-domain { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--rk-text); letter-spacing:-0.5px; }
.rk-domain span { color:var(--rk-blue); }
.rk-live-badge {
display:flex; align-items:center; gap:7px;
background:var(--rk-green-dim); border:1px solid var(--rk-green);
color:var(--rk-green); font-size:11px; font-weight:600;
padding:5px 12px; border-radius:20px; letter-spacing:0.5px;
}
.rk-live-dot { width:7px; height:7px; border-radius:50%; background:var(--rk-green); animation:rkpulse 1.6s ease-in-out infinite; }
@keyframes rkpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.rk-est-badge {
display:flex; align-items:center; gap:7px;
background:var(--rk-yellow-dim); border:1px solid var(--rk-yellow);
color:var(--rk-yellow); font-size:11px; font-weight:600;
padding:5px 12px; border-radius:20px; letter-spacing:0.5px;
}
/* Section headers */
.rk-section { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.rk-section-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--rk-muted); }
.rk-section-line { flex:1; height:1px; background:var(--rk-border); }
/* Metrics grid */
.rk-metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:900px){.rk-metrics{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.rk-metrics{grid-template-columns:repeat(2,1fr)}}
.rk-mcard {
background:var(--rk-surface); border:1px solid var(--rk-border);
border-radius:12px; padding:16px 14px; position:relative; overflow:hidden;
transition:border-color .2s,transform .2s;
}
.rk-mcard:hover { border-color:var(--rk-border2); transform:translateY(-2px); }
.rk-mcard::before {
content:''; position:absolute; inset:0;
background:radial-gradient(ellipse at top left, var(--rk-accent,#4d9fff10) 0%,transparent 70%);
pointer-events:none;
}
.rk-mlabel { font-size:9px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--rk-muted); margin-bottom:8px; }
.rk-mval   { font-size:28px; font-weight:800; line-height:1; letter-spacing:-1px; }
.rk-msub   { font-size:10px; color:var(--rk-muted); margin-top:5px; }
/* Dial */
.rk-dial { position:relative; width:72px; height:72px; margin:0 auto 6px; }
.rk-dial svg { transform:rotate(-90deg); }
.rk-dial-bg   { fill:none; stroke:var(--rk-border2); stroke-width:6; }
.rk-dial-fill { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1); }
.rk-dial-txt  { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; letter-spacing:-1px; }
/* Alert */
.rk-alert { border-radius:10px; padding:12px 16px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px; margin-bottom:20px; border:1px solid; }
.rk-alert-red    { background:var(--rk-red-dim);    border-color:var(--rk-red);    color:var(--rk-red); }
.rk-alert-yellow { background:var(--rk-yellow-dim); border-color:var(--rk-yellow); color:var(--rk-yellow); }
.rk-alert-green  { background:var(--rk-green-dim);  border-color:var(--rk-green);  color:var(--rk-green); }
.rk-alert-dot { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }
/* Table */
.rk-table-wrap { background:var(--rk-surface); border:1px solid var(--rk-border); border-radius:14px; overflow:hidden; margin-bottom:20px; }
.rk-table { width:100%; border-collapse:collapse; font-size:13px; }
.rk-table thead tr { background:var(--rk-surface2); border-bottom:1px solid var(--rk-border2); }
.rk-table th { padding:11px 14px; text-align:left; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--rk-muted); white-space:nowrap; }
.rk-table tbody tr { border-bottom:1px solid var(--rk-border); transition:background .15s; }
.rk-table tbody tr:last-child { border-bottom:none; }
.rk-table tbody tr:hover { background:var(--rk-surface2); }
.rk-table td { padding:13px 14px; vertical-align:middle; }
/* Rank badge */
.rk-rbadge { display:inline-flex; align-items:center; justify-content:center; min-width:42px; height:27px; padding:0 9px; border-radius:6px; font-size:12px; font-weight:700; border:1px solid; }
.rk-top3   { background:var(--rk-green-dim);  border-color:var(--rk-green);  color:var(--rk-green); }
.rk-top10  { background:var(--rk-yellow-dim); border-color:var(--rk-yellow); color:var(--rk-yellow); }
.rk-top30  { background:var(--rk-orange-dim); border-color:var(--rk-orange); color:var(--rk-orange); }
.rk-none   { background:var(--rk-red-dim);    border-color:var(--rk-red);    color:var(--rk-red);   font-size:9px; letter-spacing:0.5px; min-width:72px; }
/* Local badge /
.rk-local { display:inline-flex; align-items:center; gap:4px; background:var(--rk-blue-dim); border:1px solid var(--rk-blue); color:var(--rk-blue); font-size:10px; font-weight:700; padding:3px 8px; border-radius:5px; }
/ Featured badge /
.rk-feat  { display:inline-flex; align-items:center; gap:4px; background:var(--rk-gold-dim); border:1px solid var(--rk-gold); color:var(--rk-gold); font-size:9px; font-weight:700; padding:3px 8px; border-radius:5px; letter-spacing:0.5px; }
/ Source badge */
.rk-src { font-size:9px; font-weight:600; padding:3px 8px; border-radius:4px; letter-spacing:0.5px; text-transform:uppercase; border:1px solid; }
.rk-src-serp { background:var(--rk-green-dim); border-color:var(--rk-green); color:var(--rk-green); }
.rk-src-est  { background:var(--rk-border2);   border-color:var(--rk-dim);   color:var(--rk-muted); }
.rk-src-cse  { background:var(--rk-blue-dim);  border-color:var(--rk-blue);  color:var(--rk-blue); }
.rk-ml-badge { font-size:9px; font-weight:700; padding:2px 7px; background:var(--rk-purple-dim); border:1px solid var(--rk-purple); color:var(--rk-purple); border-radius:4px; letter-spacing:0.5px; }
/* Keyword cell */
.rk-kw { font-weight:600; color:var(--rk-text); font-size:13px; }
.rk-tags { display:flex; gap:4px; margin-top:3px; flex-wrap:wrap; }
.rk-tag  { font-size:9px; font-weight:600; padding:2px 6px; border-radius:3px; letter-spacing:0.5px; text-transform:uppercase; }
.rk-tag-local  { background:var(--rk-purple-dim); color:var(--rk-purple); border:1px solid var(--rk-purple); }
.rk-tag-mobile { background:var(--rk-border2); color:var(--rk-muted); border:1px solid var(--rk-dim); }
/* URL */
.rk-url { font-size:11px; color:var(--rk-blue); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; display:block; text-decoration:none; }
.rk-url:hover { text-decoration:underline; }
.rk-nourl { color:var(--rk-dim); font-size:11px; }
/* CTR bar */
.rk-ctr-val { font-size:13px; font-weight:700; }
.rk-ctr-bar { width:60px; height:3px; background:var(--rk-border2); border-radius:2px; overflow:hidden; margin-top:4px; }
.rk-ctr-fill { height:100%; border-radius:2px; transition:width .6s ease; }
/* Roadmap */
.rk-roadmap { background:var(--rk-surface); border:1px solid var(--rk-border); border-radius:14px; padding:18px; }
.rk-road-item { display:flex; align-items:flex-start; gap:12px; padding:11px 13px; background:var(--rk-surface2); border:1px solid var(--rk-border); border-radius:8px; transition:border-color .2s; margin-bottom:10px; }
.rk-road-item:last-child { margin-bottom:0; }
.rk-road-item:hover { border-color:var(--rk-border2); }
.rk-road-icon { font-size:15px; flex-shrink:0; margin-top:1px; }
.rk-road-body { flex:1; }
.rk-road-label { font-weight:700; font-size:13px; color:var(--rk-text); margin-bottom:2px; }
.rk-road-desc  { font-size:11px; color:var(--rk-muted); line-height:1.5; }
.rk-impact { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; align-self:flex-start; flex-shrink:0; margin-top:2px; border:1px solid; }
.rk-impact-high   { background:var(--rk-red-dim);    color:var(--rk-red);    border-color:var(--rk-red); }
.rk-impact-medium { background:var(--rk-yellow-dim); color:var(--rk-yellow); border-color:var(--rk-yellow); }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Theme helpers ── */
function savedTheme() {
    try { return localStorage.getItem('zh-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'); }
    catch { return 'light'; }
}
function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem('zh-theme', t); } catch {}
}

function ThemeToggle({ dark, onToggle }) {
    return (
        <button className="theme-btn" onClick={onToggle} title="Toggle dark / light mode">
            <span>{dark ? '☀️' : '🌙'}</span>

            <span>{dark ? 'Light' : 'Dark'}</span>
        </button>

}

/* ── Browser Mockup Screenshot Component ── */
function BrowserMockup({ url, dark }) {
    const [imgState, setImgState] = useState('loading');
    const [imgSrc, setImgSrc]     = useState('');

    useEffect(() => {
        if (!url) { setImgState('placeholder'); return; }
        setImgState('loading');

        const fullUrl = url.startsWith('http') ? url : 'https://' + url;
        const encoded = encodeURIComponent(fullUrl);

        // Free screenshot services, tried in order
        const services = [
            // WordPress mshots — completely free, no key needed
            `https://s0.wordpress.com/mshots/v1/${encoded}?w=800&h=500`,
            // Placeholder.com as final image fallback (won't happen — we SVG before that)
        ];

        let cancelled = false;
        let timer = null;
        let img = null;

        const tryService = (src) => {
            img = new Image();
            timer = setTimeout(() => {
                if (!cancelled) setImgState('placeholder');
            }, 9000); // 9s timeout — mshots can be slow for uncached sites

            img.onload = () => {
                clearTimeout(timer);
                if (cancelled) return;
                // mshots returns a tiny grey pixel while it's rendering (not ready yet)
                if (img.naturalWidth <= 8 || img.naturalHeight <= 8) {
                    setImgState('placeholder');
                } else {
                    setImgSrc(src);
                    setImgState('loaded');
                }
            };
            img.onerror = () => {
                clearTimeout(timer);
                if (!cancelled) setImgState('placeholder');
            };
            img.crossOrigin = 'anonymous';
            img.src = src;
        };

        tryService(services[0]);

        return () => {
            cancelled = true;
            clearTimeout(timer);
            if (img) { img.onload = null; img.onerror = null; }
        };
    }, [url]);

    const cleanDomain = url ? url.replace(/https?:\/\/(www\.)?/, '').split('/')[0] : '';

    return (
        <div className="browser-mockup">
            {/* Title bar */}
            <div className="browser-titlebar">
                <div className="browser-dots">
                    <div className="browser-dot dot-red"></div>
                    <div className="browser-dot dot-yellow"></div>
                    <div className="browser-dot dot-green"></div>
                </div>
                <div className="browser-bar">
                    <span className="browser-lock">🔒</span>
                    <span className="browser-url">{cleanDomain || 'yourpractice.com'}</span>
                </div>
                {url && (
                    <a href={url.startsWith('http') ? url : 'https://' + url}
                       target="_blank" rel="noopener"
                       className="browser-open-btn">
                        Open ↗
                    </a>
                )}
            </div>

            {/* Screenshot area */}
            <div className="browser-screenshot-area">
                {imgState === 'loading' && (
                    <div className="screenshot-loading">
                        <div className="screenshot-spinner"></div>
                        <span>Loading preview…</span>
                    </div>
                )}

                {imgState === 'loaded' && (
                    <img
                        src={imgSrc}
                        alt={`Screenshot of ${cleanDomain}`}
                        onError={() => setImgState('placeholder')}
                    />
                )}

                {imgState === 'placeholder' && (
                    <SitePlaceholder domain={cleanDomain} dark={dark} />
                )}
            </div>

            {/* Footer bar */}
            <div style={{
                padding: '6px 14px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                borderTop: `1px solid ${dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)'}`,
                background: dark ? '#22263a' : '#f5f5f5',
            }}>
                <span style={{ fontSize: 10, color: dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', gap: 4 }}>
                    🖥️ Site preview
                </span>
                {url && (
                    <a href={url.startsWith('http') ? url : 'https://' + url}
                       target="_blank" rel="noopener"
                       style={{ fontSize: 10, color: '#60a5fa', textDecoration: 'none' }}>
                        Open ↗
                    </a>
                )}
            </div>
        </div>
    );
}

function Rankings({ dark, analysisResults, formData }) {
const [keywords,   setKeywords]   = React.useState([]);
const [kwInput,    setKwInput]    = React.useState('');
const [location,   setLocation]   = React.useState('India');
const [device,     setDevice]     = React.useState('mobile');
const [domain,     setDomain]     = React.useState('');
const [isChecking, setIsChecking] = React.useState(false);
const [error,      setError]      = React.useState(null);
const resultsRef = React.useRef(null);
React.useEffect(() => {
    if (formData?.websiteUrl) {
        const d = formData.websiteUrl.replace(/https?:\/\//,'').replace(/www\./,'').split('/')[0];
        setDomain(d);
    }
}, [formData]);

const T  = dark ? 'text-gray-100' : 'text-gray-800';
const T2 = dark ? 'text-gray-400' : 'text-gray-600';
const S  = dark ? 'bg-gray-800'   : 'bg-white';
const BD = dark ? 'border-gray-700' : 'border-gray-200';

const addKeyword = () => {
    const kw = kwInput.trim();
    if (!kw || keywords.includes(kw) || keywords.length >= 20) return;
    setKeywords(p => [...p, kw]);
    setKwInput('');
};
const removeKeyword = kw => setKeywords(p => p.filter(k => k !== kw));
const handleKwKey   = e => { if (e.key === 'Enter') { e.preventDefault(); addKeyword(); } };

/* ── vanilla JS render into the dark panel ── */
function renderDarkPanel(data) {
    const el = resultsRef.current;
    if (!el) return;
    const results = data.results || [];
    const metrics = data.metrics || {};
    const dev     = data.device  || 'mobile';
    const live    = data.live_data;
    const domainClean = data.domain || domain;

    const CTR_CURVE  = {0:28.5,1:27.6,2:15.8,3:11.0,4:8.4,5:6.3,6:4.9,7:3.9,8:3.3,9:2.7,10:2.4};
    const LOCAL_CTR  = {1:14.0,2:7.0,3:4.5};
    const getCTR = rank => rank!=null ? (CTR_CURVE[rank]??Math.max(0.3,2.4-(rank-10)*0.06)) : 0;

    const rankBadge = (rank, featured) => {
        if (featured && rank!=null) return `<span class="rk-rbadge rk-top3">⭐ #${rank}</span>`;
        if (rank==null)             return `<span class="rk-rbadge rk-none">NOT IN TOP 100</span>`;
        if (rank<=3)  return `<span class="rk-rbadge rk-top3">#${rank}</span>`;
        if (rank<=10) return `<span class="rk-rbadge rk-top10">#${rank}</span>`;
        if (rank<=30) return `<span class="rk-rbadge rk-top30">#${rank}</span>`;
        return `<span class="rk-rbadge rk-none">#${rank}</span>`;
    };
    const localBadge = lr => lr
        ? `<span class="rk-local">📍 #${lr}</span>`
        : `<span style="color:var(--rk-dim)">—</span>`;
    const featBadge = f => f
        ? `<span class="rk-feat">⭐ SNIPPET</span>`
        : `<span style="color:var(--rk-dim)">—</span>`;
    const srcBadge = s => {
        const m = {serpapi:'rk-src-serp',google_cse:'rk-src-cse',estimated:'rk-src-est',ml_predicted:'rk-src-est'};
        const l = {serpapi:'SerpApi',google_cse:'CSE',estimated:'Est.',ml_predicted:'ML'};
        return `<span class="rk-src ${m[s]||'rk-src-est'}">${l[s]||s||'?'}</span>`;
    };
    const ctrCell = (rank, lr) => {
        let ctr = getCTR(rank);
        if (lr) ctr += (LOCAL_CTR[lr]||0);
        const pct   = Math.min(100,(ctr/42)*100);
        const color = ctr>10?'var(--rk-green)':ctr>4?'var(--rk-yellow)':ctr>0?'var(--rk-orange)':'var(--rk-red)';
        return `<span class="rk-ctr-val" style="color:${color}">${ctr.toFixed(1)}%</span>
                <div class="rk-ctr-bar"><div class="rk-ctr-fill" style="width:${pct}%;background:${color}"></div></div>`;
    };
    const kwTags = (kw, dv) => {
        let t = '';
        if ((kw||'').toLowerCase().includes('near me')) t += `<span class="rk-tag rk-tag-local">local</span>`;
        if (dv==='mobile') t += `<span class="rk-tag rk-tag-mobile">📱</span>`;
        return t ? `<div class="rk-tags">${t}</div>` : '';
    };

    // visibility
    const vs  = metrics.visibility_score||0;
    const circ = 213.6;
    const off  = circ - (vs/100)*circ;
    const dialColor = vs>=50?'var(--rk-green)':vs>=25?'var(--rk-yellow)':'var(--rk-red)';

    // alert
    const total   = metrics.total_keywords||0;
    const notRank = metrics.not_ranking||0;
    const localPk = metrics.local_pack_count||0;
    let alertHtml = '';
    if (notRank===total && total>0) {
        alertHtml = `<div class="rk-alert rk-alert-red"><div class="rk-alert-dot"></div>Low visibility — most patients searching these keywords won't find your practice. SEO work needed urgently.</div>`;
    } else if (vs<30) {
        alertHtml = `<div class="rk-alert rk-alert-yellow"><div class="rk-alert-dot"></div>Moderate visibility — significant room for improvement. Focus on GMB and local keywords.</div>`;
    } else if (localPk>0) {
        alertHtml = `<div class="rk-alert rk-alert-green"><div class="rk-alert-dot"></div>Good local presence — appearing in the Maps pack for ${localPk} keyword${localPk>1?'s':''}.</div>`;
    }

    // table rows
    const rows = results.length===0
        ? `<tr><td colspan="7"><div class="rk-empty"><div class="rk-empty-icon">🔍</div><p>No results yet.</p></div></td></tr>`
        : results.map(r => {
            const isMl = r.source==='ml_predicted';
            const urlHtml = r.url
                ? `<a href="${r.url}" target="_blank" class="rk-url">${r.url.replace(/^https?:\/\//,'').substring(0,40)}${r.url.length>45?'…':''}</a>`
                : `<span class="rk-nourl">—</span>`;
            return `<tr class="${isMl?'rk-ml-row':''}">
                <td><div style="display:flex;align-items:center;gap:6px">${rankBadge(r.rank,r.featured)}${isMl?`<span class="rk-ml-badge">ML</span>`:''}</div></td>
                <td>${localBadge(r.local_rank)}</td>
                <td><div class="rk-kw">${r.keyword}</div>${kwTags(r.keyword,r.device||dev)}</td>
                <td class="rk-hide-sm">${urlHtml}</td>
                <td>${featBadge(r.featured)}</td>
                <td class="rk-hide-sm">${srcBadge(r.source)}</td>
                <td>${ctrCell(r.rank,r.local_rank)}</td>
            </tr>`;
        }).join('');

    // roadmap
    const roadItems = [];
    const notRankList = results.filter(r=>!r.rank);
    if (notRankList.length>0) roadItems.push({icon:'⊘',label:'Create targeted pages',desc:`${notRankList.length} keyword${notRankList.length>1?'s':''} (${notRankList.map(r=>`"${r.keyword}"`).join(', ')}) have no ranking. Write dedicated service pages or blog posts for each.`,impact:'HIGH'});
    if (!localPk) roadItems.push({icon:'⊕',label:'Claim your Google Business Profile',desc:'Fully completing your GMB listing often yields top-3 rankings in the local pack for location-based searches.',impact:'HIGH'});
    if (!(metrics.featured_count>0)) roadItems.push({icon:'⊙',label:'Target featured snippets',desc:'Add FAQ schema and concise Q&A paragraphs to win position 0.',impact:'MEDIUM'});
    roadItems.push({icon:'⊛',label:'Build local citations',desc:'List on Healthgrades, Zocdoc, WebMD directory and local health directories to boost domain authority.',impact:'MEDIUM'});
    roadItems.push({icon:'◎',label:'Improve PageSpeed score',desc:'Compress images and enable browser caching. Each 10-point PageSpeed increase correlates with ~1–2 rank positions.',impact:'LOW'});
    const impCls = {HIGH:'rk-impact-high',MEDIUM:'rk-impact-medium',LOW:'rk-impact-low'};
    const roadHtml = roadItems.map(it=>`
        <div class="rk-road-item">
            <div class="rk-road-icon">${it.icon}</div>
            <div class="rk-road-body"><div class="rk-road-label">${it.label}</div><div class="rk-road-desc">${it.desc}</div></div>
            <span class="rk-impact ${impCls[it.impact]}">${it.impact}</span>
        </div>`).join('');

    // inject everything
    el.innerHTML = `
    <div class="rk-shell">
        <!-- Header -->
        <div class="rk-header">
            <div class="rk-domain">${domainClean.replace('.','<span>.</span>')}</div>
            <div style="display:flex;align-items:center;gap:10px;font-size:12px;color:var(--rk-muted)">
                ${data.location||'India'} · ${dev} · ${results.length} keyword${results.length!==1?'s':''}
                ${live
                    ? `<div class="rk-live-badge"><div class="rk-live-dot"></div>Live Google data</div>`
                    : `<div class="rk-est-badge">⚡ Estimated data</div>`
                }
            </div>
        </div>

        <!-- Metrics -->
        <div class="rk-section"><div class="rk-section-title">📊 Smart Metrics</div><div class="rk-section-line"></div></div>
        <div class="rk-metrics">
            <div class="rk-mcard" style="--rk-accent:#4d9fff18">
                <div class="rk-mlabel">Visibility</div>
                <div class="rk-dial">
                    <svg width="72" height="72" viewBox="0 0 72 72">
                        <circle class="rk-dial-bg" cx="36" cy="36" r="30"/>
                        <circle class="rk-dial-fill" cx="36" cy="36" r="30"
                            stroke="${dialColor}" stroke-dasharray="188.5"
                            stroke-dashoffset="${188.5-(vs/100)*188.5}"/>
                    </svg>
                    <div class="rk-dial-txt" style="color:${dialColor}">${vs}</div>
                </div>
                <div class="rk-msub" style="text-align:center">~${(metrics.ctr_estimate||0).toFixed(1)}% avg CTR</div>
            </div>
            <div class="rk-mcard" style="--rk-accent:#f5c84215">
                <div class="rk-mlabel">Avg Rank</div>
                <div class="rk-mval" style="color:var(--rk-yellow)">${metrics.avg_rank?'#'+metrics.avg_rank:'—'}</div>
                <div class="rk-msub">across all keywords</div>
            </div>
            <div class="rk-mcard" style="--rk-accent:#00e5a015">
                <div class="rk-mlabel">Top 3</div>
                <div class="rk-mval" style="color:var(--rk-green)">${metrics.top_3||0}</div>
                <div class="rk-msub">positions 1–3</div>
            </div>
            <div class="rk-mcard" style="--rk-accent:#4d9fff15">
                <div class="rk-mlabel">Local Pack 📍</div>
                <div class="rk-mval" style="color:var(--rk-blue)">${metrics.local_pack_count||0}</div>
                <div class="rk-msub">in Maps 3-pack</div>
            </div>
            <div class="rk-mcard" style="--rk-accent:#ff456715">
                <div class="rk-mlabel">Not Ranking</div>
                <div class="rk-mval" style="color:var(--rk-red)">${metrics.not_ranking||0}</div>
                <div class="rk-msub">outside top 100</div>
            </div>
        </div>

        ${alertHtml}

        <!-- Table -->
        <div class="rk-section"><div class="rk-section-title">📋 Keyword Rankings</div><div class="rk-section-line"></div></div>
        <div class="rk-table-wrap">
            <table class="rk-table">
                <thead><tr>
                    <th>Rank</th><th>Local Pack</th><th>Keyword</th>
                    <th class="rk-hide-sm">URL</th><th>Featured</th>
                    <th class="rk-hide-sm">Source</th><th>Est. CTR</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>

        <!-- Roadmap -->
        <div class="rk-section" style="margin-top:20px"><div class="rk-section-title">💡 Ranking Improvement Roadmap</div><div class="rk-section-line"></div></div>
        <div class="rk-roadmap">${roadHtml}</div>
    </div>`;
}

    });

    // Scroll-reactive parallax for home blobs
useEffect(() => {
    if (activeTab !== 'home') return;

    // Each blob: [horizontal drift speed, vertical drift speed, rotation-ish skew]
    const speeds = [
        { x: 0.04,  y: 0.10 },
        { x: -0.06, y: 0.07 },
        { x: 0.05,  y: -0.08 },
        { x: -0.04, y: 0.09 },
        { x: 0.07,  y: -0.05 },
    ];

    let ticking = false;
    const onScroll = () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
            const y = window.scrollY;
            blobRefs.current.forEach((el, i) => {
                if (!el) return;
                const sp = speeds[i] || { x: 0.05, y: 0.08 };
                el.style.transform = `translate(${y * sp.x}px, ${y * sp.y}px)`;
            });
            ticking = false;
        });
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll(); // set initial position
    return () => window.removeEventListener('scroll', onScroll);
}, [activeTab]);
    useEffect(() => { applyTheme(dark ? 'dark' : 'light'); }, [dark]);

    const toggleDark = () => setDark(d => !d);
    const fi = (e) => setForm(p => ({ ...p, [e.target.name]: e.target.value }));

    const pollStatus = async (id) => {
        let tries = 0;
        const tick = async () => {
            if (tries++ > 120) { setIsAnalyzing(false); return; }
            try {
                const r = await fetch(`/api/analysis-status/${id}`);
                const d = await r.json();
                if (d.status === 'complete') {
                    setAnalysisResults(d.results); setIsAnalyzing(false);
                    setActiveTab('results'); setActiveResultsTab('overview'); setCompetitorData(null);
                } else if (d.status === 'error') { setIsAnalyzing(false); alert('Analysis failed: '+(d.error||'')); }
                else setTimeout(tick, 2000);
            } catch { setTimeout(tick, 2000); }
        };
        tick();
    };
    const startAnalysis = async () => {
    setIsAnalyzing(true);
    try {
        const r = await fetch('/api/analyze-website', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form) });

        if (d.analysis_id) pollStatus(d.analysis_id);

                            <svg className="w-8 h-8 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span className={`text-2xl font-bold ${T}`}>RankPulse </span>
                        </button>
                        <nav className="hidden md:flex items-center space-x-6">
                            <button onClick={()=>setActiveTab('diagnose')}   className={`${activeTab==='diagnose'  ?'text-emerald-500':T2} hover:text-emerald-500 text-sm font-medium transition-colors`}>DIAGNOSE YOUR PRACTICE</button>
                            <button onClick={()=>setActiveTab('signIn')}     className={`${activeTab==='signIn'    ?'text-emerald-500':T2} hover:text-emerald-500 text-sm font-medium transition-colors`}>SIGN IN</button>
                            {analysisResults && (
                                <button onClick={()=>setActiveTab('results')} className={`${activeTab==='results'?'text-blue-400':T2} hover:text-blue-400 text-sm font-medium transition-colors`}>MY RESULTS</button>
                            )}
                            <button onClick={()=>setActiveTab('rankings')}   className={`${activeTab==='rankings'  ?'text-emerald-500':T2} hover:text-emerald-500 text-sm font-medium transition-colors`}>RANKINGS</button>
                            <a href="/admin" className={`${T2} hover:text-emerald-500 text-sm font-medium transition-colors`}>ADMIN</a>
                            <ThemeToggle dark={dark} onToggle={toggleDark}/>
                        </nav>
                        <div className="flex md:hidden"><ThemeToggle dark={dark} onToggle={toggleDark}/></div>
                    </div>
                </div>
            </header>

            <div className="min-h-screen">
                {/* Every panel stays mounted; only CSS display toggles */}
                <div style={show('home')}>{renderHome()}</div>
                <div style={show('diagnose')}>{renderDiagnoseForm()}</div>
                <div style={show('signIn')}>{renderSignIn()}</div>
                <div style={show('results')}>{renderResults()}</div>
                <div style={show('rankings')}>
                    <Rankings
                        dark={dark}
                        analysisResults={analysisResults}
                        formData={form}
                    />
                </div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
(function() {
    const fab   = document.getElementById('zh-chat-fab');
    const win   = document.getElementById('zh-chat-win');
    const msgs  = document.getElementById('zh-messages');
    const input = document.getElementById('zh-textarea');
    const send  = document.getElementById('zh-send-btn');
    const badge = document.getElementById('zh-badge');
    const chips = document.querySelectorAll('.zh-chip');
    let isOpen    = false;
    let isLoading = false;
    let history   = [];

    function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }

    function addBubble(role, text) {
        const wrap = document.createElement('div');
        wrap.className = 'zh-bubble-wrap ' + (role === 'user' ? 'user' : 'bot');
        const icon = document.createElement('div');
        icon.className = 'zh-icon';
        icon.textContent = role === 'user' ? '🧑' : '🤖';
        const bub = document.createElement('div');
        bub.className = 'zh-bubble ' + (role === 'user' ? 'user' : 'bot');
        bub.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code style="background:rgba(16,185,129,.15);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
        if (role === 'user') { wrap.appendChild(bub); wrap.appendChild(icon); }
        else                 { wrap.appendChild(icon); wrap.appendChild(bub); }
        msgs.appendChild(wrap);
        scrollBottom();
        return bub;
    }

    function showTyping() {
        const wrap = document.createElement('div');
        wrap.className = 'zh-bubble-wrap bot'; wrap.id = 'zh-typing-row';
        const icon = document.createElement('div'); icon.className = 'zh-icon'; icon.textContent = '🤖';
        const dot  = document.createElement('div'); dot.className = 'zh-bubble bot';
        dot.innerHTML = '<div class="zh-typing"><span></span><span></span><span></span></div>';
        wrap.appendChild(icon); wrap.appendChild(dot);
        msgs.appendChild(wrap); scrollBottom();
    }
    function hideTyping() { const t = document.getElementById('zh-typing-row'); if (t) t.remove(); }

    fab.addEventListener('click', () => {
        isOpen = !isOpen;
        win.classList.toggle('open', isOpen);
        badge.classList.remove('show');
        if (isOpen && msgs.children.length === 0) greet();
    });
    document.getElementById('zh-close-btn').addEventListener('click', () => {
        isOpen = false; win.classList.remove('open');
    });

    function greet() {
        setTimeout(() => addBubble('bot', "👋 Hi there! I'm **ZoΞ**, your RankPulse  AI assistant.\n\nI can help you understand your website score, explain how each metric is calculated, and give you actionable tips to attract more patients. What would you like to know?"), 300);
    }

    setTimeout(() => { if (!isOpen) badge.classList.add('show'); }, 3000);

    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        send.disabled = !input.value.trim() || isLoading;
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!send.disabled) doSend(); }
    });
    send.addEventListener('click', doSend);

    chips.forEach(c => c.addEventListener('click', () => {
        input.value = c.dataset.q;
        input.dispatchEvent(new Event('input'));
        doSend();
    }));

    async function doSend() {
        const text = input.value.trim();
        if (!text || isLoading) return;
        input.value = ''; input.style.height = 'auto'; send.disabled = true;

        addBubble('user', text);
        history.push({ role: 'user', content: text });

        isLoading = true; showTyping();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: history.slice(-10),
                })
            });
            const data = await res.json();
            hideTyping();
            const reply = data?.reply || 'Sorry, I had trouble answering that. Please try again.';
            addBubble('bot', reply);
            history.push({ role: 'assistant', content: reply });
        } catch (err) {
            hideTyping();
            addBubble('bot', '⚠️ Connection error. Please check your network and try again.');
            console.error('ZoΞ API error:', err);
        }
        isLoading = false;
        send.disabled = !input.value.trim();
    }
})();
</script>
